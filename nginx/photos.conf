# birds.garden — serwowanie zdjęć z detekcji
# Wklej do bloku server { ... } w konfiguracji nginx dla birds.garden
# (obok proxy_pass na bird-api). photo_path z DB → URL:
#   https://birds.garden/photos/2026-06-13/143022_481.jpg

location /photos/ {
    alias /opt/bird-api/photos/;   # = PHOTOS_DIR z .env (musi się zgadzać)
    autoindex off;
    expires 7d;                    # zdjęcia są niezmienne — można cache'ować
    add_header Cache-Control "public, immutable";
    # tylko obrazy:
    location ~* \.(jpg|jpeg|png|webp)$ {
        try_files $uri =404;
    }
}
